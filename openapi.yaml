openapi: 3.1.0
info:
  title: YouTube Automation API
  description: |
    REST API for YouTube video automation system that manages video lifecycle from ideation to post-publication.

    This API provides comprehensive CRUD operations for video management across 8 distinct phases:
    - Phase 0: Published
    - Phase 1: Publish Pending
    - Phase 2: Edit Requested
    - Phase 3: Material Done
    - Phase 4: Started
    - Phase 5: Delayed
    - Phase 6: Sponsored Blocked
    - Phase 7: Ideas

    Each video progresses through phases with specific tasks and completion tracking.
  version: 1.0.0
  contact:
    name: Viktor Farcic
    url: https://github.com/vfarcic/youtube-automation
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the API server. This endpoint does not require authentication.
      operationId: healthCheck
      security: []
      tags:
        - Health
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/categories:
    get:
      summary: List categories
      description: Returns the available video categories (directory names in the manuscript store).
      operationId: getCategories
      tags:
        - Categories
      responses:
        "200":
          description: List of category names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["devops", "reviews", "ama"]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/aspects:
    get:
      summary: List all aspects with field metadata
      description: Returns all aspects with their complete field definitions, types, labels, and completion criteria.
      operationId: getAspects
      tags:
        - Aspects
      responses:
        "200":
          description: All aspects with full field metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Aspect"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/aspects/overview:
    get:
      summary: Aspect summaries
      description: Returns lightweight aspect summaries without field details.
      operationId: getAspectsOverview
      tags:
        - Aspects
      responses:
        "200":
          description: Aspect overview list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AspectOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/aspects/{key}/fields:
    get:
      summary: Get aspect fields
      description: Returns the field definitions for a specific aspect.
      operationId: getAspectFields
      tags:
        - Aspects
      parameters:
        - $ref: "#/components/parameters/AspectKey"
      responses:
        "200":
          description: Aspect fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AspectFields"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/aspects/{key}/fields/{field}/completion:
    get:
      summary: Get field completion criteria
      description: Returns the completion criteria for a specific field within an aspect.
      operationId: getFieldCompletion
      tags:
        - Aspects
      parameters:
        - $ref: "#/components/parameters/AspectKey"
        - name: field
          in: path
          required: true
          schema:
            type: string
          description: Field name (JSON tag)
      responses:
        "200":
          description: Completion criteria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionCriteriaResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/videos:
    get:
      summary: List videos by phase
      description: Returns all videos for a given phase with computed progress data.
      operationId: getVideos
      tags:
        - Videos
      parameters:
        - name: phase
          in: query
          required: true
          schema:
            type: integer
          description: Phase number (0-7)
      responses:
        "200":
          description: List of enriched videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      summary: Create a video
      description: Creates a new video with the given name, category, and optional date.
      operationId: createVideo
      tags:
        - Videos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoRequest"
      responses:
        "201":
          description: Video created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/videos/phases:
    get:
      summary: List phases with counts
      description: Returns all lifecycle phases with the number of videos in each.
      operationId: getPhases
      tags:
        - Videos
      responses:
        "200":
          description: Phase list with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhaseInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/videos/list:
    get:
      summary: Lightweight video list
      description: Returns a lightweight list of videos for a given phase (id, name, category, title, progress).
      operationId: getVideosList
      tags:
        - Videos
      parameters:
        - name: phase
          in: query
          required: true
          schema:
            type: integer
          description: Phase number (0-7)
      responses:
        "200":
          description: Lightweight video list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoListItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/videos/{videoName}:
    get:
      summary: Get a video
      description: Returns a single video by name and category with computed progress.
      operationId: getVideo
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Video details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update a video
      description: Replaces the full video data. Fields from the request body are merged over the existing video.
      operationId: updateVideo
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial or full video fields (JSON tags from storage.Video)
      responses:
        "200":
          description: Updated video
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      summary: Patch a video aspect
      description: |
        Applies a partial update to a single aspect of a video. Only fields belonging
        to the specified aspect are accepted. Returns the full enriched video.
      operationId: patchVideoAspect
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
        - name: aspect
          in: query
          required: true
          schema:
            type: string
            enum:
              - initial_details
              - work_progress
              - definition
              - post_production
              - publishing
              - post_publish
              - analysis
          description: Aspect key to patch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Field names (JSON tags) and their new values for the specified aspect
      responses:
        "200":
          description: Updated video with optional sync warning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      summary: Delete a video
      description: Permanently deletes a video by name and category.
      operationId: deleteVideo
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "204":
          description: Video deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/videos/{videoName}/progress:
    get:
      summary: Get video progress
      description: Returns overall and per-aspect completion progress for a video.
      operationId: getVideoProgress
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Progress breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverallProgressResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/videos/{videoName}/progress/{aspect}:
    get:
      summary: Get aspect progress
      description: Returns completion progress for a single aspect of a video.
      operationId: getVideoAspectProgress
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
        - $ref: "#/components/parameters/AspectKeyPath"
      responses:
        "200":
          description: Aspect progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AspectProgressInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/videos/{videoName}/manuscript:
    get:
      summary: Get video manuscript
      description: Returns the raw manuscript content for a video.
      operationId: getVideoManuscript
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Manuscript content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManuscriptResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/videos/{videoName}/animations:
    get:
      summary: Get video animations
      description: Returns animation cues and section headers extracted from the video's gist file.
      operationId: getVideoAnimations
      tags:
        - Videos
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Animation cues and sections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnimationsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/ai/titles/{category}/{name}:
    post:
      summary: Generate title suggestions
      description: Uses AI to generate title suggestions from the video manuscript.
      operationId: aiTitles
      tags:
        - AI
      parameters:
        - $ref: "#/components/parameters/CategoryPath"
        - $ref: "#/components/parameters/NamePath"
      responses:
        "200":
          description: Generated titles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITitlesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/description/{category}/{name}:
    post:
      summary: Generate description
      description: Uses AI to generate a YouTube description from the video manuscript.
      operationId: aiDescription
      tags:
        - AI
      parameters:
        - $ref: "#/components/parameters/CategoryPath"
        - $ref: "#/components/parameters/NamePath"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIDescriptionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/tags/{category}/{name}:
    post:
      summary: Generate tags
      description: Uses AI to generate YouTube tags from the video manuscript.
      operationId: aiTags
      tags:
        - AI
      parameters:
        - $ref: "#/components/parameters/CategoryPath"
        - $ref: "#/components/parameters/NamePath"
      responses:
        "200":
          description: Generated tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITagsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/tweets/{category}/{name}:
    post:
      summary: Generate tweet suggestions
      description: Uses AI to generate tweet/social post suggestions from the video manuscript.
      operationId: aiTweets
      tags:
        - AI
      parameters:
        - $ref: "#/components/parameters/CategoryPath"
        - $ref: "#/components/parameters/NamePath"
      responses:
        "200":
          description: Generated tweets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITweetsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/description-tags/{category}/{name}:
    post:
      summary: Generate description hashtags
      description: Uses AI to generate hashtag suggestions from the video manuscript.
      operationId: aiDescriptionTags
      tags:
        - AI
      parameters:
        - $ref: "#/components/parameters/CategoryPath"
        - $ref: "#/components/parameters/NamePath"
      responses:
        "200":
          description: Generated hashtags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIDescriptionTagsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/shorts/{category}/{name}:
    post:
      summary: Analyze manuscript for Shorts
      description: Uses AI to identify potential YouTube Shorts segments from the video manuscript.
      operationId: aiShorts
      tags:
        - AI
      parameters:
        - $ref: "#/components/parameters/CategoryPath"
        - $ref: "#/components/parameters/NamePath"
      responses:
        "200":
          description: Short candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIShortsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/thumbnails:
    post:
      summary: Generate thumbnail variations
      description: Uses AI to generate variation prompts for a thumbnail image. Accepts either a local file path or a Google Drive file ID.
      operationId: aiThumbnails
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIThumbnailsRequest"
      responses:
        "200":
          description: Thumbnail variation prompts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIThumbnailsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/translate:
    post:
      summary: Translate video metadata
      description: Uses AI to translate title, description, tags, timecodes, and short titles to a target language.
      operationId: aiTranslate
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AITranslateRequest"
      responses:
        "200":
          description: Translated metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITranslateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/ama/content:
    post:
      summary: Generate all AMA content
      description: Uses AI to generate title, timecodes, description, and tags for an AMA video from its manuscript.
      operationId: aiAMAContent
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAMARequest"
      responses:
        "200":
          description: Generated AMA content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAMAContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/ama/title:
    post:
      summary: Generate AMA title
      description: Uses AI to generate a title for an AMA video from its manuscript.
      operationId: aiAMATitle
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAMARequest"
      responses:
        "200":
          description: Generated title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAMATitleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/ama/description:
    post:
      summary: Generate AMA description
      description: Uses AI to generate a description for an AMA video from its manuscript.
      operationId: aiAMADescription
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAMARequest"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAMADescriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/ai/ama/timecodes:
    post:
      summary: Generate AMA timecodes
      description: Uses AI to generate timecodes for an AMA video from its manuscript.
      operationId: aiAMATimecodes
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAMARequest"
      responses:
        "200":
          description: Generated timecodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAMATimecodesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/drive/upload/thumbnail/{videoName}:
    post:
      summary: Upload thumbnail to Google Drive
      description: |
        Uploads a thumbnail image to Google Drive and updates the video's thumbnail variant
        with the Drive file ID. Creates a per-video subfolder if a root folder is configured.
      operationId: driveUploadThumbnail
      tags:
        - Drive
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
        - name: variantIndex
          in: query
          required: true
          schema:
            type: integer
          description: Index of the thumbnail variant to update
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - thumbnail
              properties:
                thumbnail:
                  type: string
                  format: binary
                  description: Thumbnail image file
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  driveFileId:
                    type: string
                  variantIndex:
                    type: integer
                  syncWarning:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/drive/upload/video/{videoName}:
    post:
      summary: Upload video to Google Drive
      description: |
        Uploads a video file to Google Drive and updates the video's VideoFile and VideoDriveFileID fields.
        Creates a per-video subfolder if a root folder is configured.
      operationId: driveUploadVideo
      tags:
        - Drive
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - video
              properties:
                video:
                  type: string
                  format: binary
                  description: Video file
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  driveFileId:
                    type: string
                  videoFile:
                    type: string
                    example: "drive://abc123"
                  syncWarning:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/drive/download/video/{videoName}:
    get:
      summary: Download video from Google Drive
      description: Streams the video file from Google Drive. Returns the binary file with appropriate Content-Type and Content-Disposition headers.
      operationId: driveDownloadVideo
      tags:
        - Drive
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Video file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/actions/request-thumbnail/{videoName}:
    post:
      summary: Request thumbnail creation
      description: |
        Sets the RequestThumbnail flag on the video and optionally sends an email
        to the thumbnail creator. Returns immediately if already requested.
      operationId: requestThumbnail
      tags:
        - Actions
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/actions/request-edit/{videoName}:
    post:
      summary: Request video editing
      description: |
        Sets the RequestEdit flag on the video and optionally sends an email
        to the video editor. Returns immediately if already requested.
      operationId: requestEdit
      tags:
        - Actions
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/publish/youtube/{videoName}:
    post:
      summary: Upload video to YouTube
      description: |
        Uploads the video file and thumbnail to YouTube. Supports both local files
        and Google Drive-hosted files (downloads to temp, uploads, cleans up).
      operationId: publishYouTube
      tags:
        - Publishing
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishYouTubeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/publish/youtube/{videoName}/thumbnail:
    post:
      summary: Re-upload thumbnail to YouTube
      description: Re-uploads a thumbnail for an existing YouTube video.
      operationId: publishThumbnail
      tags:
        - Publishing
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Thumbnail uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishThumbnailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/publish/youtube/{videoName}/shorts/{shortId}:
    post:
      summary: Upload a Short to YouTube
      description: Uploads a YouTube Short for the given video and short ID.
      operationId: publishShort
      tags:
        - Publishing
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
        - name: shortId
          in: path
          required: true
          schema:
            type: string
          description: Short identifier
      responses:
        "200":
          description: Short uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishShortResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/publish/hugo/{videoName}:
    post:
      summary: Create Hugo blog post
      description: Creates a Hugo blog post for the video. Supports both local filesystem and remote Git PR workflow.
      operationId: publishHugo
      tags:
        - Publishing
      parameters:
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Hugo post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishHugoResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/publish/transcript/{videoId}:
    get:
      summary: Get YouTube transcript
      description: Fetches the captions/transcript for a YouTube video.
      operationId: getTranscript
      tags:
        - Publishing
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
          description: YouTube video ID
      responses:
        "200":
          description: Transcript text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/publish/metadata/{videoId}:
    get:
      summary: Get YouTube metadata
      description: Fetches the title, description, tags, and publish date for a YouTube video.
      operationId: getMetadata
      tags:
        - Publishing
      parameters:
        - name: videoId
          in: path
          required: true
          schema:
            type: string
          description: YouTube video ID
      responses:
        "200":
          description: Video metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

  /api/social/{platform}/{videoName}:
    post:
      summary: Post to social media
      description: |
        Posts or prepares a social media post for the given platform.
        Supported platforms: bluesky (auto-posts), slack (auto-posts),
        linkedin (returns text for copy-paste), hackernews (returns text),
        dot (returns text).
      operationId: socialPost
      tags:
        - Social
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
            enum: [bluesky, slack, linkedin, hackernews, dot]
          description: Social media platform
        - $ref: "#/components/parameters/VideoName"
        - $ref: "#/components/parameters/Category"
      responses:
        "200":
          description: Post result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "501":
          $ref: "#/components/responses/NotImplemented"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token authentication. Set the API_TOKEN environment variable on the server.
        If API_TOKEN is empty, authentication is disabled. The /health endpoint is always public.

  parameters:
    VideoName:
      name: videoName
      in: path
      required: true
      schema:
        type: string
      description: Video name (filename without extension)
    Category:
      name: category
      in: query
      required: true
      schema:
        type: string
      description: Video category
    AspectKey:
      name: key
      in: path
      required: true
      schema:
        type: string
        enum:
          - initial_details
          - work_progress
          - definition
          - post_production
          - publishing
          - post_publish
          - analysis
      description: Aspect key
    AspectKeyPath:
      name: aspect
      in: path
      required: true
      schema:
        type: string
        enum:
          - initial_details
          - work_progress
          - definition
          - post_production
          - publishing
          - post_publish
          - analysis
      description: Aspect key
    CategoryPath:
      name: category
      in: path
      required: true
      schema:
        type: string
      description: Video category
    NamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Video name

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized - missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotImplemented:
      description: Feature not configured (e.g., Google Drive or publishing service not set up)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
        detail:
          type: string
          description: Additional error details

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        time:
          type: string
          format: date-time

    ProgressInfo:
      type: object
      properties:
        completed:
          type: integer
        total:
          type: integer

    VideoResponse:
      type: object
      description: Full video data with computed phase and per-aspect progress
      properties:
        id:
          type: string
          description: "Composite ID: category/name"
          example: "devops/my-video"
        phase:
          type: integer
          description: Computed lifecycle phase (0-7)
        init:
          $ref: "#/components/schemas/ProgressInfo"
        work:
          $ref: "#/components/schemas/ProgressInfo"
        define:
          $ref: "#/components/schemas/ProgressInfo"
        edit:
          $ref: "#/components/schemas/ProgressInfo"
        publish:
          $ref: "#/components/schemas/ProgressInfo"
        postPublish:
          $ref: "#/components/schemas/ProgressInfo"
        syncWarning:
          type: string
          description: Warning message if git sync failed or is not configured
        pullWarning:
          type: string
          description: |
            Warning message if the throttled `git pull --rebase` triggered when
            opening the video detail page failed. The local copy is still
            returned; the field is omitted on success or when git sync is not
            configured.
      additionalProperties: true

    VideoListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        date:
          type: string
        title:
          type: string
        phase:
          type: integer
        progress:
          $ref: "#/components/schemas/ProgressInfo"

    CreateVideoRequest:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
          description: Video name (used as filename)
        category:
          type: string
          description: Video category
        date:
          type: string
          description: Optional publish date (YYYY-MM-DD)

    PhaseInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        count:
          type: integer

    AspectProgressInfo:
      type: object
      properties:
        aspectKey:
          type: string
        title:
          type: string
        completed:
          type: integer
        total:
          type: integer

    OverallProgressResponse:
      type: object
      properties:
        overall:
          $ref: "#/components/schemas/ProgressInfo"
        aspects:
          type: array
          items:
            $ref: "#/components/schemas/AspectProgressInfo"

    ManuscriptResponse:
      type: object
      properties:
        content:
          type: string

    AnimationsResponse:
      type: object
      properties:
        animations:
          type: array
          items:
            type: string
        sections:
          type: array
          items:
            type: string

    Aspect:
      type: object
      description: Aspect with full field metadata
      properties:
        key:
          type: string
        title:
          type: string
        fields:
          type: array
          items:
            type: object

    AspectOverview:
      type: object
      properties:
        key:
          type: string
        title:
          type: string

    AspectFields:
      type: object
      properties:
        key:
          type: string
        title:
          type: string
        fields:
          type: array
          items:
            type: object

    CompletionCriteriaResponse:
      type: object
      properties:
        aspectKey:
          type: string
        fieldKey:
          type: string
        completionCriteria:
          type: string

    AITitlesResponse:
      type: object
      properties:
        titles:
          type: array
          items:
            type: string

    AIDescriptionResponse:
      type: object
      properties:
        description:
          type: string

    AITagsResponse:
      type: object
      properties:
        tags:
          type: string

    AITweetsResponse:
      type: object
      properties:
        tweets:
          type: array
          items:
            type: string

    AIDescriptionTagsResponse:
      type: object
      properties:
        descriptionTags:
          type: string

    AIShortsResponse:
      type: object
      properties:
        candidates:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              startTime:
                type: string
              endTime:
                type: string
              hook:
                type: string

    AIThumbnailsRequest:
      type: object
      properties:
        category:
          type: string
        name:
          type: string
        imagePath:
          type: string
          description: Local file path to the thumbnail image
        driveFileId:
          type: string
          description: Google Drive file ID of the thumbnail image
      description: Either imagePath or driveFileId is required

    AIThumbnailsResponse:
      type: object
      properties:
        subtle:
          type: string
        bold:
          type: string

    AITranslateRequest:
      type: object
      required:
        - category
        - name
        - targetLanguage
      properties:
        category:
          type: string
        name:
          type: string
        targetLanguage:
          type: string

    AITranslateResponse:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: string
        timecodes:
          type: string
        shortTitles:
          type: array
          items:
            type: string

    AIAMARequest:
      type: object
      required:
        - category
        - name
      properties:
        category:
          type: string
        name:
          type: string

    AIAMAContentResponse:
      type: object
      properties:
        title:
          type: string
        timecodes:
          type: string
        description:
          type: string
        tags:
          type: string

    AIAMATitleResponse:
      type: object
      properties:
        title:
          type: string

    AIAMADescriptionResponse:
      type: object
      properties:
        description:
          type: string

    AIAMATimecodesResponse:
      type: object
      properties:
        timecodes:
          type: string

    ActionResponse:
      type: object
      properties:
        alreadyRequested:
          type: boolean
        emailSent:
          type: boolean
        emailError:
          type: string
        video:
          $ref: "#/components/schemas/VideoResponse"
        syncWarning:
          type: string

    PublishYouTubeResponse:
      type: object
      properties:
        videoId:
          type: string
        syncWarning:
          type: string

    PublishThumbnailResponse:
      type: object
      properties:
        success:
          type: boolean
        syncWarning:
          type: string

    PublishShortResponse:
      type: object
      properties:
        youtubeId:
          type: string
        syncWarning:
          type: string

    PublishHugoResponse:
      type: object
      properties:
        hugoPath:
          type: string
        syncWarning:
          type: string

    TranscriptResponse:
      type: object
      properties:
        transcript:
          type: string

    MetadataResponse:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        publishedAt:
          type: string

    SocialPostResponse:
      type: object
      properties:
        posted:
          type: boolean
          description: Whether the post was automatically published
        message:
          type: string
          description: Text for manual copy-paste (linkedin, hackernews, dot)
        postUrl:
          type: string
          description: URL of the published post (if available)
        syncWarning:
          type: string
