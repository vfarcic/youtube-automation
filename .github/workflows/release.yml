name: Create Release and Upload Binaries

on:
  push:
    branches:
      - main # Triggers on push/merge to main

permissions:
  contents: write # Needed to create releases, upload assets, and push tags
  packages: write # Needed to push container images to ghcr.io

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build
          cd ..
          rm -rf internal/frontend/dist
          cp -r web/dist internal/frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Configure Git User
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Determine Next Version
        id: next_version
        run: echo "VERSION=$(make get-next-minor-version)" >> $GITHUB_OUTPUT

      - name: Create and Push New Tag
        env:
          NEXT_VERSION: ${{ steps.next_version.outputs.VERSION }}
        run: |
          echo "Creating tag: $NEXT_VERSION"
          git tag $NEXT_VERSION ${{ github.sha }} # Tag the commit that triggered the workflow
          git push origin $NEXT_VERSION

      - name: Build release binaries
        run: make build # Makefile uses 'git describe' which will use the new tag

      - name: List built assets (for debugging)
        run: ls -lh youtube-release_*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.next_version.outputs.VERSION }}
          tags: |
            ghcr.io/vfarcic/youtube-automation:${{ steps.next_version.outputs.VERSION }}
            ghcr.io/vfarcic/youtube-automation:latest

      - name: Update Helm chart version
        env:
          NEXT_VERSION: ${{ steps.next_version.outputs.VERSION }}
        run: |
          VERSION_NO_V="${NEXT_VERSION#v}"
          sed -i "s/^version: .*/version: ${VERSION_NO_V}/" helm/youtube-automation/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION_NO_V}\"/" helm/youtube-automation/Chart.yaml
          sed -i "s/^  tag: .*/  tag: \"${VERSION_NO_V}\"/" helm/youtube-automation/values.yaml
          git add helm/youtube-automation/Chart.yaml helm/youtube-automation/values.yaml
          git commit -m "chore: update Helm chart to ${VERSION_NO_V} [skip ci]" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ steps.next_version.outputs.VERSION }}
        run: |
          gh release create $NEXT_VERSION \
            --generate-notes \
            --target ${{ github.sha }} \
            ./youtube-release_darwin_amd64 \
            ./youtube-release_darwin_arm64 \
            ./youtube-release_linux_amd64 \
            ./youtube-release_linux_arm64 \
            ./youtube-release_windows_amd64
