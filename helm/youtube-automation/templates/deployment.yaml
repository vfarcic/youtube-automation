apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "youtube-automation.fullname" . }}
  labels:
    {{- include "youtube-automation.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "youtube-automation.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "youtube-automation.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --host=0.0.0.0
            - --port={{ .Values.service.targetPort }}
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "youtube-automation.secretName" . }}
                  key: {{ include "youtube-automation.secretKey" . }}
            {{- if .Values.git.repoURL }}
            - name: GIT_REPO_URL
              value: {{ .Values.git.repoURL | quote }}
            - name: GIT_BRANCH
              value: {{ .Values.git.branch | quote }}
            {{- if .Values.git.token }}
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "youtube-automation.secretName" . }}
                  key: git-token
            {{- end }}
            {{- end }}
            - name: SETTINGS_FILE
              value: /app/settings.yaml
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: settings
              mountPath: /app/settings.yaml
              subPath: settings.yaml
              readOnly: true
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: settings
          configMap:
            name: {{ include "youtube-automation.fullname" . }}-settings
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
