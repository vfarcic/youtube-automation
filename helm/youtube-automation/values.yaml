replicaCount: 1

image:
  repository: ghcr.io/vfarcic/youtube-automation
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion.
  tag: "v0.266.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: youtube-automation.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

# API authentication token — set via --set or external secret
apiToken: ""

# Reference an existing Secret instead of creating one.
# When set, the chart will NOT create its own Secret and will use this one.
existingSecret: ""
# Key within the existing secret that holds the API token
existingSecretKey: "api-token"

# Additional environment variables (map of name: value).
# Use this for non-sensitive config. For secrets, prefer envFrom with a Secret reference.
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                    ENVIRONMENT VARIABLES REFERENCE                          │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │                                                                             │
# │ CORE (handled by the chart automatically):                                  │
# │   API_TOKEN          - API auth token (from apiToken / existingSecret)      │
# │   GIT_REPO_URL       - Data repo URL (from git.repoURL)                    │
# │   GIT_BRANCH         - Data repo branch (from git.branch, default: main)   │
# │   GIT_TOKEN          - Data repo auth token (from git.token)               │
# │   DATA_DIR           - Video data directory (default: ./tmp)               │
# │                                                                             │
# │ AI PROVIDER (required for AI features like title/description generation):   │
# │   AI_PROVIDER        - "anthropic" or "azure" (default: anthropic)          │
# │   ANTHROPIC_API_KEY  - Anthropic API key (required if provider=anthropic)   │
# │   ANTHROPIC_MODEL    - Model name (default: claude-sonnet-4-20250514)       │
# │   AI_KEY             - Azure OpenAI key (required if provider=azure)        │
# │                                                                             │
# │ YOUTUBE (required):                                                         │
# │   YOUTUBE_API_KEY    - YouTube Data API v3 key                              │
# │   YOUTUBE_CHANNEL_ID - YouTube channel ID (for analytics features)          │
# │                                                                             │
# │ SLACK (required for Slack posting):                                         │
# │   SLACK_API_TOKEN             - Slack Bot OAuth token (xoxb-...)            │
# │   SLACK_CHANNEL_IDS           - Comma-separated Slack channel IDs           │
# │                                 (e.g., "C123456789,C987654321")             │
# │   SLACK_RETRY_ATTEMPTS        - Retry count (default: 3)                   │
# │   SLACK_RETRY_BACKOFF_SECONDS - Retry backoff in seconds (default: 1)      │
# │                                                                             │
# │ BLUESKY (required for Bluesky posting):                                     │
# │   BLUESKY_IDENTIFIER - Bluesky username (e.g., user.bsky.social)           │
# │   BLUESKY_PASSWORD   - Bluesky account password                            │
# │                                                                             │
# │ HUGO (required for blog post integration):                                  │
# │   HUGO_REPO_URL      - Hugo blog repo URL                                  │
# │   HUGO_BRANCH        - Hugo repo branch (default: main)                    │
# │   GITHUB_TOKEN       - GitHub token for Hugo repo access / PR creation     │
# │                                                                             │
# │ EMAIL (required for email notifications):                                   │
# │   EMAIL_PASSWORD     - SMTP email password                                 │
# │   EMAIL_FROM         - Sender email address                                │
# │   EMAIL_EDIT_TO      - Recipient for edit requests                         │
# │   EMAIL_FINANCE_TO   - Recipient for finance emails                        │
# │                                                                             │
# │ GOOGLE DRIVE (required for thumbnail uploads):                              │
# │   GDRIVE_CREDENTIALS_FILE - Path to client_secret JSON file                │
# │   GDRIVE_TOKEN_FILE       - Token cache filename (default: gdrive-go.json) │
# │   GDRIVE_FOLDER_ID        - Root Drive folder ID for uploads (optional)    │
# │                                                                             │
# │ AMA SCHEDULER (optional — daily AMA livestream auto-processing):            │
# │   AMA_ENABLED      - "true" to enable scheduler (default: false)            │
# │   AMA_PLAYLIST_ID  - YouTube playlist ID for AMA stream archive             │
# │   AMA_SCHEDULE     - Cron expression, 5 fields (default: "0 10 * * *")      │
# │   AMA_EMAIL_TO     - Operator email for processed/failed/error notices     │
# │                                                                             │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# Example:
# env:
#   AI_PROVIDER: "anthropic"
#   ANTHROPIC_MODEL: "claude-sonnet-4-20250514"
#   SLACK_RETRY_ATTEMPTS: "5"
#
# For secrets (ANTHROPIC_API_KEY, SLACK_API_TOKEN, etc.), use envFrom:
# envFrom:
#   - secretRef:
#       name: youtube-automation-secrets
env: {}

# Inject environment variables from Secrets or ConfigMaps.
# Recommended for sensitive values like API keys and tokens.
envFrom: []
# - secretRef:
#     name: my-secret
# - configMapRef:
#     name: my-configmap

# Git sync configuration for data repository
git:
  repoURL: ""
  branch: "main"
  token: ""

# Extra args passed to the serve command
extraArgs: []

# Volume mounts for the container (e.g., OAuth credential files)
volumeMounts: []
# - name: oauth-credentials
#   mountPath: /secrets/oauth
#   readOnly: true

# Volumes to attach to the pod
volumes: []
# - name: oauth-credentials
#   secret:
#     secretName: youtube-automation-oauth

nodeSelector: {}
tolerations: []
affinity: {}

# Structured settings rendered into a ConfigMap and mounted as /app/settings.yaml.
# API keys (GEMINI_API_KEY, OPENAI_API_KEY) stay as env vars from K8s Secrets.
settings:
  thumbnailGeneration:
    # photoDir: directory containing creator photo files used for thumbnail compositing.
    # Operators must mount a volume at this path (e.g., via volumeMounts/volumes above)
    # so that the container can read the photo assets at runtime.
    photoDir: /data/photos
    providers:
      - name: gemini
        model: gemini-3-pro-image-preview
      - name: gpt-image
        model: gpt-image-2

# AMA scheduler (PRD #386): daily in-app cron that auto-processes the latest
# AMA stream from the configured YouTube playlist. When enabled, the server
# fetches the playlist, checks the latest video's description for the
# timecodes-marker, and (if absent) generates AI title/description/tags/
# timecodes and applies them to YouTube. An email is sent on success, failure,
# or scheduler error; a marker-present (already-processed) run is silent.
#
# When ama.enabled is false (default) all other ama.* fields are ignored and
# no scheduler goroutines are started.
#
# Note: when ama.enabled=true the AMA_* values below are rendered into the
# container's env: list. Per Kubernetes' env merge rules, env: takes
# precedence over envFrom — so if the same AMA_* keys are also injected via
# .Values.envFrom (configMapRef/secretRef), the values set here win. To
# manage AMA_* via a ConfigMap/Secret instead, leave ama.enabled=false and
# inject AMA_ENABLED + the other AMA_* keys through envFrom.
ama:
  # Master switch. Set to true and configure the rest to enable the scheduler.
  enabled: false
  # YouTube playlist ID containing the AMA livestream archive.
  playlistId: ""
  # Cron expression (5-field standard format). Default runs daily at 10:00 UTC.
  schedule: "0 10 * * *"
  # Operator email address for processed/failed/scheduler-error notifications.
  emailTo: ""
